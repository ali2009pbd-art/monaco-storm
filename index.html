<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعصار مـونـاكو - الشد الخارجي</title>
    <style>
        body { 
            background-color: #0d0d0d; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* Background Image (Dragon Battle) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://ali2009pbd-art.github.io/monaco-storm/image_25.png'); /* رابط الصورة مالتك */
            background-size: cover;
            background-position: center;
            opacity: 0.15; /* شفافية خفيفة حتى ما تشوش على النص */
            z-index: 5;
            pointer-events: none;
        }
        
        /* Box and UI Elements */
        .box { background: rgba(26,26,26,0.9); border: 2px solid #ff4b2b; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; box-shadow: 0 0 25px #ff4b2b; position: relative; z-index: 20; }
        h2 { color: #ff4b2b; text-shadow: 0 0 5px #000; }
        label { display: block; text-align: right; margin: 10px 0 5px; color: #ff4b2b; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #333; border-radius: 5px; color: white; box-sizing: border-box; }
        .btn { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; position: relative; z-index: 20; }
        
        /* Mandatory Subscription Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .overlay h3 { color: #ff4b2b; margin-bottom: 20px; }
        .tg-btn { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 20px; text-decoration: none; display: inline-flex; align-items: center; }
        .tg-btn img { width: 24px; height: 24px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="overlay" id="subscription-overlay">
        <h3>⚠️ اشتراك إجباري ⚠️</h3>
        <p>الأداة مغلقة حالياً. يرجى الاشتراك في القناة الرسمية لتفعيل جميع الأزرار واستخدام الأداة.</p>
        <a href="https://t.me/Monaco_Diary" class="tg-btn" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
            اشترك هنا و ضل شد 🇫🇷
        </a>
        <button class="btn" id="activate-btn" style="width: auto; padding: 10px 20px;" onclick="checkSub()">لقد اشتركت، فعل الأداة</button>
    </div>
    
    <div class="box">
        <h2>🇫🇷 عـلـي مـونـاكو 🇫🇷</h2>
        <p>يوزر تليجرام: @A_K_F5</p>
        <hr style="border: 0.5px solid #333;">
        <label>📧 بريد الدعم:</label>
        <input type="text" id="email" value="stopCA@telegram.org, abuse@telegram.org" readonly>
        <label>❄️ الموضوع:</label>
        <input type="text" id="subject" value="URGENT: Illegal Content - @User" placeholder="اكتب يوزر الهدف">
        <label>📝 نص البلاغ:</label>
        <textarea id="body" rows="6" placeholder="اكتب وصف البلاغ هنا"></textarea>
        <button class="btn" id="send-btn" onclick="send()" style="filter: grayscale(1); cursor: not-allowed;" disabled>🚀 إرسال البلاغ الخارجي</button>
    </div>
    
    <div class="footer">بإشراف عـلـي مـونـاكو | إعصار الشد 🌪️</div>
    
    <script>
        // Check Subscription (Placeholder for Simulation)
        function checkSub() {
            // Simulate subscription verification (front-end only)
            localStorage.setItem('monaco_subscribed', 'true');
            document.getElementById('subscription-overlay').style.display = 'none';
            // Enable the send button
            const sendBtn = document.getElementById('send-btn');
            sendBtn.style.filter = 'grayscale(0)';
            sendBtn.style.cursor = 'pointer';
            sendBtn.disabled = false;
        }
        
        // Show overlay if not subscribed
        if (localStorage.getItem('monaco_subscribed') !== 'true') {
            document.getElementById('subscription-overlay').style.display = 'flex';
        } else {
            document.getElementById('subscription-overlay').style.display = 'none';
            // Enable the send button immediately if already subscribed
            const sendBtn = document.getElementById('send-btn');
            sendBtn.style.filter = 'grayscale(0)';
            sendBtn.style.cursor = 'pointer';
            sendBtn.disabled = false;
        }
        
        // Send Function
        function send() {
            const email = document.getElementById('email').value;
            const sub = encodeURIComponent(document.getElementById('subject').value);
            const msg = encodeURIComponent(document.getElementById('body').value);
            window.location.href = `mailto:${email}?subject=${sub}&body=${msg}`;
        }
    </script>
</body>
</html>
