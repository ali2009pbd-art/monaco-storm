<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعصار مـونـاكو - الشد الخارجي</title>
    <style>
        body { 
            background-color: #0d0d0d; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        .box { background: rgba(26,26,26,0.9); border: 2px solid #00eeff; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; box-shadow: 0 0 25px #00eeff; position: relative; z-index: 20; }
        h2 { color: #00eeff; text-shadow: 0 0 5px #000; }
        label { display: block; text-align: right; margin: 10px 0 5px; color: #00eeff; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #333; border-radius: 5px; color: white; box-sizing: border-box; }
        .btn { background: linear-gradient(45deg, #00eeff, #0000ff); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; position: relative; z-index: 20; }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 10; }
        .waving-flag { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; opacity: 0.15; transform-origin: top; animation: flagWave 5s ease-in-out infinite; pointer-events: none;}
        .waving-flag img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes flagWave { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.05) translateY(-20px); } }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .tg-btn { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; margin-bottom: 20px;}
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="waving-flag"><img src="https://upload.wikimedia.org/wikipedia/en/c/c3/Flag_of_France.svg"></div>
    <div class="overlay" id="subscription-overlay">
        <h3>⚠️ اشتراك إجباري ⚠️</h3>
        <p>الأداة مغلقة. اشترك لتفعيل الإعصار.</p>
        <a href="https://t.me/Monaco_Diary" class="tg-btn" target="_blank">اشترك هنا و ضل شد 🇫🇷</a>
        <button class="btn" style="width: auto; padding: 10px 20px;" onclick="checkSub()">لقد اشتركت، فعل الأداة</button>
    </div>
    <div class="box">
        <h2>🇫🇷 عـلـي مـونـاكو 🇫🇷</h2>
        <p>يوزر تليجرام: @A_K_F5</p>
        <hr style="border: 0.5px solid #333;">
        <label>📧 بريد الدعم:</label>
        <input type="text" id="email" value="stopCA@telegram.org, abuse@telegram.org" readonly>
        <label>❄️ الموضوع:</label>
        <input type="text" id="subject" value="URGENT: Blackmail Report - @User">
        <label>📝 نص البلاغ:</label>
        <textarea id="body" rows="6"></textarea>
        <button class="btn" id="send-btn" onclick="send()" disabled style="filter: grayscale(1);">🚀 إرسال البلاغ الخارجي</button>
    </div>
    <div class="footer">بإشراف عـلـي مـونـاكو | إعصار الشد 🌪️</div>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        function checkSub() { localStorage.setItem('monaco_sub', 'true'); document.getElementById('subscription-overlay').style.display = 'none'; const btn = document.getElementById('send-btn'); btn.disabled = false; btn.style.filter = 'grayscale(0)'; }
        if (localStorage.getItem('monaco_sub') === 'true') { document.getElementById('subscription-overlay').style.display = 'none'; const btn = document.getElementById('send-btn'); btn.disabled = false; btn.style.filter = 'grayscale(0)'; }
        function send() { window.location.href = `mailto:${document.getElementById('email').value}?subject=${encodeURIComponent(document.getElementById('subject').value)}&body=${encodeURIComponent(document.getElementById('body').value)}`; }
        particlesJS("particles-js", { "particles": { "number": { "value": 150 }, "color": { "value": ["#00eeff", "#0000ff"] }, "shape": { "type": "circle" }, "opacity": { "value": 0.8 }, "size": { "value": 4 }, "move": { "enable": true, "speed": 10, "direction": "top" } } });
    </script>
</body>
</html>
